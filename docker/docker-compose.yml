services:
  # ---------------------------------------------------------
  # 1. API Server (CPU Profile)
  # ---------------------------------------------------------
  ragflow-cpu:
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - cpu
    image: ${RAGFLOW_IMAGE}
    container_name: ragflow-cpu-api
    # NATIVE PRODUCTION FLAG: Runs the API/Web server, disables heavy background OCR
    command:
      - --disable-taskexecutor
      - --enable-adminserver
      - --workers=1
    #mem_limit: 2684354560 # 2.5GB limit
    ports:
      - ${SVR_WEB_HTTP_PORT}:80
      - ${SVR_WEB_HTTPS_PORT}:443
      - ${SVR_HTTP_PORT}:9380
      - ${ADMIN_SVR_HTTP_PORT}:9381
      - ${SVR_MCP_PORT}:9382 # entry for MCP (host_port:docker_port). The docker_port must match the value you set for `mcp-port` above.
      - ${GO_HTTP_PORT}:9384
      - ${GO_ADMIN_PORT}:9383
    volumes:
      - ./ragflow-logs:/ragflow/logs
      # - ./nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf
      # - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      # - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template
      - ./entrypoint.sh:/ragflow/entrypoint.sh
      - ./progress_sync.py:/ragflow/progress_sync.py
    env_file: .env
    networks:
      - ragflow
    restart: unless-stopped
    # https://docs.docker.com/engine/daemon/prometheus/#create-a-prometheus-configuration
    # If you use Docker Desktop, the --add-host flag is optional. This flag ensures that the host's internal IP is exposed to the Prometheus container.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ---------------------------------------------------------
  # 2. API Server (GPU Profile)
  # ---------------------------------------------------------
  ragflow-gpu:
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - gpu
    image: ${RAGFLOW_IMAGE}
    container_name: ragflow-gpu-api
    # NATIVE PRODUCTION FLAG: Runs the API/Web server, disables heavy background OCR
    command:
      - --disable-taskexecutor
      - --workers=1
    #mem_limit: 2684354560 # 2.5GB limit
    ports:
      - ${SVR_WEB_HTTP_PORT}:80
      - ${SVR_WEB_HTTPS_PORT}:443
      - ${SVR_HTTP_PORT}:9380
      - ${ADMIN_SVR_HTTP_PORT}:9381
      - ${SVR_MCP_PORT}:9382 # entry for MCP (host_port:docker_port). The docker_port must match the value you set for `mcp-port` above.
    volumes:
      - ./ragflow-logs:/ragflow/logs
      # - ./nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf
      # - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      # - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template
      - ./entrypoint.sh:/ragflow/entrypoint.sh
      - ./progress_sync.py:/ragflow/progress_sync.py
    env_file: .env
    networks:
      - ragflow
    restart: unless-stopped
    # https://docs.docker.com/engine/daemon/prometheus/#create-a-prometheus-configuration
    # If you use Docker Desktop, the --add-host flag is optional. This flag ensures that the host's internal IP is exposed to the Prometheus container.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ---------------------------------------------------------
  # 3. Task Executor (The Heavy Lifter for OCR & Parsing)
  # ---------------------------------------------------------
  ragflow-executor:
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      #- gpu
      - cpu
    image: ${RAGFLOW_IMAGE}
    container_name: ragflow-executor
    # NATIVE PRODUCTION FLAG: Disables the web server, sets up 4 background workers
    command:
      - --disable-webserver
      - --workers=4
    #mem_limit: 7516192768 # 7GB limit for heavy PDF parsing
    volumes:
      - ./ragflow-logs:/ragflow/logs
      - ./service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template
      - ./entrypoint.sh:/ragflow/entrypoint.sh
    env_file: .env
    environment:
      # Crucial Limits: Prevents OOM crashes during massive document uploads
      - MAX_CONCURRENT_TASKS=4
      - MAX_CONCURRENT_CHUNK_BUILDERS=4
      - EMBEDDING_BATCH_SIZE=32
    networks:
      - ragflow
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    #deploy:
    #  resources:
    #    reservations:
    #      devices:
    #        - driver: nvidia
    #          count: all
    #          capabilities: [gpu]

  # ---------------------------------------------------------
  # 4. Metadata Database
  # ---------------------------------------------------------
  #postgres:
  #  image: postgres:18
  #  container_name: ragflow-postgres
  #  #mem_limit: 1073741824 # 1 GB (More than enough for metadata routing)
  #  env_file: .env
  #  environment:
  #    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  #    - POSTGRES_DB=${POSTGRES_DBNAME}
  #    - POSTGRES_USER=rag_flow
  #  ports:
  #    - ${POSTGRES_PORT}:5432
  #  volumes:
  #    - ragflow_postgres_data:/var/lib/postgresql
  #  networks:
  #    - ragflow
  #  healthcheck:
  #    test: [ "CMD", "pg_isready", "-U", "rag_flow" ]
  #    interval: 10s
  #    timeout: 10s
  #    retries: 3
  #  restart: unless-stopped

  mysql:
    # mysql:5.7 linux/arm64 image is unavailable.
    image: mysql:8.0.39
    container_name: ragflow-mysql
    env_file: .env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
    command:
      --max_connections=1000
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --tls_version="TLSv1.2,TLSv1.3"
      --init-file /data/application/init.sql
      --binlog_expire_logs_seconds=604800
    ports:
      - ${EXPOSE_MYSQL_PORT}:3306
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/data/application/init.sql
    networks:
      - ragflow
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-uroot", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped


  # ---------------------------------------------------------
  # 5. Elasticsearch (Vector & Keyword Search)
  # ---------------------------------------------------------
  es01:
    profiles:
      - elasticsearch
    image: elasticsearch:${STACK_VERSION}
    container_name: ragflow-elasticsearch
    volumes:
      - esdata01:/usr/share/elasticsearch/data
    ports:
      - ${ES_PORT}:9200
    env_file: .env
    environment:
      - node.name=es01
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=false
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.watermark.low=5gb
      - cluster.routing.allocation.disk.watermark.high=3gb
      - cluster.routing.allocation.disk.watermark.flood_stage=2gb
    #mem_limit: 3221225472 # 3GB (Java Heap + Lucene Cache)
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: [ "CMD-SHELL", "curl http://localhost:9200" ]
      interval: 10s
      timeout: 10s
      retries: 120
    networks:
      - ragflow
    restart: unless-stopped

  # ---------------------------------------------------------
  # 6. MinIO (Object Storage for PDFs/Images)
  # ---------------------------------------------------------
  minio:
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: [ "server", "--console-address", ":9001", "/data" ]
    ports:
      - ${MINIO_PORT}:9000
      - ${MINIO_CONSOLE_PORT}:9001
    #mem_limit: 536870912 # 512 MB (MinIO is written in Go and is incredibly memory efficient)
    env_file: .env
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    container_name: ragflow-minio
    volumes:
      - minio_data:/data
    networks:
      - ragflow
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 10s
      retries: 20

  redis:
    # swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/valkey/valkey:8
    image: valkey/valkey:8
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru" ]
    mem_limit: 268435456 # 256 MB (Redis is extremely memory-efficient)
    env_file: .env
    container_name: ragflow-redis
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - ragflow_redis_data:/data
    networks:
      - ragflow
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 120

# ---------------------------------------------------------
# Volumes & Networks
# ---------------------------------------------------------
volumes:
  esdata01:
    driver: local
  minio_data:
    driver: local
  mysql_data:
    driver: local  
  ragflow_redis_data:
    driver: local

networks:
  ragflow:
    driver: bridge
